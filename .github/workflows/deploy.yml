name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '24'
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  DEPLOY_PATH: /home/admkoda/kodanAPPS
  PUBLIC_HTML_PATH: /home/admkoda/public_html

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring, xml, curl, zip, bcmath, gd, intl
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install PHP dependencies (api)
        run: |
          cd apps/api
          composer install --optimize-autoloader --no-interaction --no-dev --ignore-platform-req=php

      - name: Run PHPStan Level 6
        run: |
          cd apps/api
          composer install --no-interaction --ignore-platform-req=php
          php vendor/bin/phpstan analyse
          composer install --optimize-autoloader --no-interaction --no-dev --ignore-platform-req=php

      - name: Install Node dependencies
        run: npm ci

      - name: Build Frontends (crm + tracker + superadmin)
        run: |
          npm run build:crm
          npm run build:tracker
          npm run build:superadmin

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ github.sha }}
          path: |
            package.json
            apps/api/
            apps/crm/dist/
            apps/tracker/dist/
            packages/superadmin/dist/
          retention-days: 7

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v7
        with:
          name: release-${{ github.sha }}
          path: release

      - name: Debug SSH Key
        run: |
          echo "Longitud en caracteres:"
          echo -n "${{ secrets.SSH_PRIVATE_KEY }}" | wc -c
          echo "Numero de lineas:"
          echo -n "${{ secrets.SSH_PRIVATE_KEY }}" | wc -l
          echo "Cabecera:"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | head -n 1
          echo "Pie:"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tail -n 1

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Disable SSH Host Key Verification
        run: |
          mkdir -p ~/.ssh
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile /dev/null\n" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy Direct to Production
        run: |
          # 1. Crear los directorios de destino físicos si no existen
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "
            mkdir -p ${{ env.DEPLOY_PATH }}/api
            mkdir -p ${{ env.DEPLOY_PATH }}/crm
            mkdir -p ${{ env.DEPLOY_PATH }}/tracker
            mkdir -p ${{ env.DEPLOY_PATH }}/superadmin
          "
          
          # 2. Transferir backend de API (esta vez se incluye vendor, pero se excluyen .env y logs locales)
          rsync -az --delete \
            --exclude='.env' \
            --exclude='storage/logs/*' \
            release/apps/api/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/api/
          
          # 3. Transferir compilado del CRM
          rsync -az --delete \
            release/apps/crm/dist/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/crm/
          
          # 4. Transferir compilado del Tracker
          rsync -az --delete \
            release/apps/tracker/dist/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/tracker/
          
          # 5. Transferir compilado del Super Admin
          rsync -az --delete \
            release/packages/superadmin/dist/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/superadmin/
          
          # 6. Ejecutar migraciones de BD y ajustar permisos (755/644) para evitar bloqueos en cPanel
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "
            set -e
            cd ${{ env.DEPLOY_PATH }}/api
            
            # Copiar index.php y .htaccess a la raíz de la API para compatibilidad con open_basedir
            [ -f public/index.php ] && cp public/index.php index.php || true
            
            # Asegurar que .htaccess exista en public/ (necesario para rewrites → rutas /api/*)
            if [ ! -f public/.htaccess ]; then
              echo 'RewriteEngine On' > public/.htaccess
              echo 'RewriteCond %{REQUEST_FILENAME} !-d' >> public/.htaccess
              echo 'RewriteCond %{REQUEST_FILENAME} !-f' >> public/.htaccess
              echo 'RewriteRule ^ index.php [L]' >> public/.htaccess
            fi
            [ -f public/.htaccess ] && cp public/.htaccess .htaccess || true
            
            # Crear carpeta de logs si no existe
            mkdir -p storage/logs
            chmod 775 storage/logs
            
            # Correr migraciones
            if [ -f migrations/run.php ]; then
              php migrations/run.php
            fi
            
            # Aplicar permisos correctos para políticas estrictivas de cPanel (suexec/ruid2)
            find ${{ env.DEPLOY_PATH }}/api -type d -exec chmod 755 {} +
            find ${{ env.DEPLOY_PATH }}/api -type f -exec chmod 644 {} +
            find ${{ env.DEPLOY_PATH }}/crm -type d -exec chmod 755 {} +
            find ${{ env.DEPLOY_PATH }}/crm -type f -exec chmod 644 {} +
            find ${{ env.DEPLOY_PATH }}/tracker -type d -exec chmod 755 {} +
            find ${{ env.DEPLOY_PATH }}/tracker -type f -exec chmod 644 {} +
            find ${{ env.DEPLOY_PATH }}/superadmin -type d -exec chmod 755 {} +
            find ${{ env.DEPLOY_PATH }}/superadmin -type f -exec chmod 644 {} +
          "
