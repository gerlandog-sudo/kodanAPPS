name: Production Deployment (kodanAPPS)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build & Push API Image
      - name: Build and push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kodanapps-api:latest
            ghcr.io/${{ github.repository_owner }}/kodanapps-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build & Push Fronts Image
      - name: Build and push Fronts Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/fronts/Dockerfile.fronts
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kodanapps-fronts:latest
            ghcr.io/${{ github.repository_owner }}/kodanapps-fronts:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Copiar las carpetas docker y scripts al VPS
      - name: Set up SSH connection
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker/,scripts/"
          target: "/opt/kodanapps"

      - name: Execute deployment via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/kodanapps
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Asegurar permisos de escritura para SQLite del Hub
            # (www-data dentro del contenedor necesita escribir en el volumen montado)
            mkdir -p /opt/kodanapps/docker/hub
            touch /opt/kodanapps/docker/hub/hub.sqlite
            chmod 777 /opt/kodanapps/docker/hub
            chmod 666 /opt/kodanapps/docker/hub/hub.sqlite
            
            # Descargar imágenes actualizadas usando compose apuntando a la subcarpeta docker/
            docker compose -f docker/docker-compose.prod.yml pull
            
            # 1. Correr migraciones en contenedor temporal aislado
            docker compose -f docker/docker-compose.prod.yml run --rm api php migrations/run.php
            
            # 2. Levantar el stack completo actualizando contenedores
            docker compose -f docker/docker-compose.prod.yml up -d --remove-orphans
            
            # Limpieza de imágenes inactivas
            docker image prune -f
