<VirtualHost *:80>
    ServerName api.kodan.software
    DocumentRoot /var/www/html/public

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Configuración para API REST
    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # CORS headers (aplicados también en PHP)
        Header always set Access-Control-Allow-Origin "https://crm.kodan.software"
        Header always set Access-Control-Allow-Origin "https://tracker.kodan.software"
        Header always set Access-Control-Allow-Credentials "true"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-CSRF-Token, X-Requested-With"
        Header always set Access-Control-Max-Age "3600"
    </Directory>

    # Manejar preflight OPTIONS
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteCond %{REQUEST_METHOD} OPTIONS
        RewriteRule ^(.*)$ $1 [R=200,L,E=HTTP_ORIGIN:%{HTTP:Origin}]
    </IfModule>

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    
    # HSTS (solo en producción con HTTPS)
    # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" env=HTTPS
</VirtualHost>