<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <style>
    :root {
      --primary: #006a60;
      --symbol: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --primary: #81ffed;
        --symbol: #060e20;
      }
    }
    .bg-plate {
      fill: var(--primary);
    }
    .symbol {
      fill: var(--symbol);
    }
  </style>
  
  <!-- Placa de pantalla redondeada -->
  <rect x="4" y="8" width="40" height="32" rx="5" class="bg-plate" />
  
  <!-- Puntos de control de ventana (Red, Yellow, Green) -->
  <circle cx="10" cy="14" r="2" fill="#ff5f56" />
  <circle cx="16" cy="14" r="2" fill="#ffbd2e" />
  <circle cx="22" cy="14" r="2" fill="#27c93f" />
  
  <!-- Chevron (>) -->
  <path d="M 12 21 L 18 26 L 12 31 L 15 31 L 21 26 L 15 21 Z" class="symbol" />
  
  <!-- Cursor (_) -->
  <rect x="24" y="29" width="8" height="2" class="symbol" />
</svg>
