<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <style>
    :root {
      --primary: #00694e;
      --secondary: #2d3748;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --primary: #83d7b5;
        --secondary: #ffffff;
      }
    }
    .body {
      stroke: var(--primary);
      stroke-width: 4.5;
      fill: none;
    }
    .handle {
      stroke: var(--primary);
      stroke-width: 4.5;
      stroke-linecap: round;
      fill: none;
    }
    .clock-face {
      stroke: var(--primary);
      stroke-width: 1.5;
      fill: none;
      opacity: 0.4;
    }
    .hand {
      stroke: var(--secondary);
      stroke-width: 2.2;
      stroke-linecap: round;
      fill: none;
    }
    .hand-long {
      stroke: var(--secondary);
      stroke-width: 1.8;
      stroke-linecap: round;
      fill: none;
    }
  </style>
  
  <!-- Lupa: Cuerpo principal (círculo) -->
  <circle cx="21" cy="21" r="13.5" class="body" />
  
  <!-- Lupa: Mango diagonal (hacia abajo-derecha) -->
  <line x1="30.5" y1="30.5" x2="41" y2="41" class="handle" />
  
  <!-- Esfera del reloj interna (círculo fino) -->
  <circle cx="21" cy="21" r="10" class="clock-face" />
  
  <!-- Manecillas del reloj -->
  <line x1="21" y1="21" x2="27.5" y2="16.5" class="hand" />
  <line x1="21" y1="21" x2="21" y2="12.5" class="hand-long" />
  
  <!-- Pin central -->
  <circle cx="21" cy="21" r="1" fill="var(--secondary)" />
</svg>
