version: '3.8'

services:
  # ------------------------------------------------------------
  # MariaDB 10.11 (matching production CloudLinux)
  # ------------------------------------------------------------
  mariadb:
    image: mariadb:10.11
    container_name: kodanapps_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-admkoda_BBDD_APPS}
      MYSQL_USER: ${DB_USER:-kodan_apps}
      MYSQL_PASSWORD: ${DB_PASS:-appsecret}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------
  # PHP 8.3 + Apache (API Backend)
  # ------------------------------------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: kodanapps_api
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-admkoda_BBDD_APPS}
      DB_USER: ${DB_USER:-kodan_apps}
      DB_PASS: ${DB_PASS:-appsecret}
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-in-production}
      APP_ENV: development
      SYSTEM_TENANT_ID: 1
    ports:
      - "8080:80"
    volumes:
      - ./apps/api:/var/www/html
      - ./packages:/var/www/packages
      - ./migrations:/var/www/html/migrations
    depends_on:
      mariadb:
        condition: service_healthy
    working_dir: /var/www/html

  # ------------------------------------------------------------
  # Node 24 (Frontends Dev)
  # ------------------------------------------------------------
  frontend:
    image: node:24-alpine
    container_name: kodanapps_frontend
    working_dir: /app
    environment:
      - VITE_API_URL=http://localhost:8080
    ports:
      - "5173:5173"  # Super Admin
      - "5174:5174"  # CRM
      - "5175:5175"  # Tracker
    volumes:
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./packages:/app/packages
      - ./apps/crm:/app/apps/crm
      - ./apps/tracker:/app/apps/tracker
      - ./packages/superadmin:/app/packages/superadmin
    command: >
      sh -c "
        npm install &&
        (npm run dev:superadmin & npm run dev:crm & npm run dev:tracker & wait)
      "
    depends_on:
      - api

  # ------------------------------------------------------------
  # Adminer (Web UI para BD - http://localhost:8081)
  # ------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: kodanapps_adminer
    ports:
      - "8081:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    profiles:
      - tools

  # ------------------------------------------------------------
  # Mailhog (Email testing para set-password tokens)
  # ------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: kodanapps_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    profiles:
      - tools

  # ------------------------------------------------------------
  # Redis (opcional, para cache/sessions futuro)
  # ------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kodanapps_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    profiles:
      - tools
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  mariadb_data:
  redis_data:

networks:
  default:
    name: kodanapps_network