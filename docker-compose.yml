version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: kodan-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: admkoda_BBDD_APPS
      MARIADB_USER: kodan_apps
      MARIADB_PASSWORD: kodan_password
    volumes:
      - mariadb_data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kodan-api
    restart: unless-stopped
    volumes:
      - ./apps/api:/var/www/html
    environment:
      - DB_HOST=db
      - DB_DATABASE=admkoda_BBDD_APPS
      - DB_USERNAME=kodan_apps
      - DB_PASSWORD=kodan_password
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: kodan-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/api:/var/www/html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api

volumes:
  mariadb_data:
