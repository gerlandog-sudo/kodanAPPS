name: kodanapps

services:
  mariadb:
    image: mariadb:10.11
    container_name: kodanapps_mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=1G
      - --innodb-log-file-size=256M
    networks:
      - kodan_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kodanapps_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - kodan_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    image: ghcr.io/gerlandog-sudo/kodanapps-api:latest
    container_name: kodanapps_api
    restart: always
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      APP_ENV: production
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_FROM_EMAIL: ${FROM_EMAIL}
      SMTP_FROM_NAME: ${FROM_NAME}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SYSTEM_TENANT_ID: ${SYSTEM_TENANT_ID}
      PUBLIC_SECRET: ${PUBLIC_SECRET}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kodan_net
    volumes:
      - ./php/docker-env.conf:/usr/local/etc/php-fpm.d/docker-env.conf:ro
      - ./.env:/var/www/html/.env:ro
      - /opt/kodanapps/backups:/opt/kodanapps/backups:rw
      - /opt/kodanapps/scripts/:/var/www/html/scripts/:ro

  fronts:
    image: ghcr.io/gerlandog-sudo/kodanapps-fronts:latest
    container_name: kodanapps-fronts
    restart: always
    networks:
      - kodan_net

  dozzle:
    image: amir20/dozzle:latest
    container_name: kodanapps_dozzle
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_FILTER: "status=running"
      DOZZLE_NO_ANALYTICS: "true"
    networks:
      - kodan_net

volumes:
  mariadb_data:
  redis_data:

networks:
  kodan_net:
    external: true
