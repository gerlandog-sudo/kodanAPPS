user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=superadmin:10m rate=10r/s;
    limit_req_status 429;

    # Compresión Gzip
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Configuraciones SSL (Cloudflare Origin Certs)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Redirección HTTP a HTTPS global
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # 1. API: api.kodan.software
    server {
        listen 443 ssl;
        server_name api.kodan.software;

        ssl_certificate /etc/nginx/certs/kodan.software.pem;
        ssl_certificate_key /etc/nginx/certs/kodan.software.key;

        include /etc/nginx/security-headers.conf;

        root /var/www/html/public;
        index index.php;

        # Rate limiting: Auth (5 req/s con burst 10)
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # Rate limiting: SuperAdmin (10 req/s con burst 15)
        location /api/super-admin/ {
            limit_req zone=superadmin burst=15 nodelay;
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # Rate limiting: General API (30 req/s con burst 40)
        location / {
            limit_req zone=api burst=40 nodelay;
            try_files $uri $uri/ /index.php$is_args$args;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass api:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            
            # Forwarding headers
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
            fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        }

        location ~ /\.ht {
            deny all;
        }
    }

    # 2. MAIN WEB: kodan.software & www.kodan.software (Proxy al contenedor independiente)
    server {
        listen 443 ssl;
        server_name kodan.software www.kodan.software;

        ssl_certificate /etc/nginx/certs/kodan.software.pem;
        ssl_certificate_key /etc/nginx/certs/kodan.software.key;

        include /etc/nginx/security-headers.conf;

        location / {
            # DNS interno de Docker
            resolver 127.0.0.11 valid=30s;
            set $upstream_web kodanweb-page;
            
            proxy_pass http://$upstream_web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. FRONTS: crm, tracker, superadmin (Proxy al contenedor unificado de fronts)
    server {
        listen 443 ssl;
        server_name crm.kodan.software tracker.kodan.software superadmin.kodan.software;

        ssl_certificate /etc/nginx/certs/kodan.software.pem;
        ssl_certificate_key /etc/nginx/certs/kodan.software.key;

        include /etc/nginx/security-headers.conf;

        location / {
            # DNS interno de Docker
            resolver 127.0.0.11 valid=30s;
            set $upstream_fronts fronts;
            
            proxy_pass http://$upstream_fronts:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
